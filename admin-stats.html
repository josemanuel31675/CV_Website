<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Stats</title>
    <link rel="stylesheet" href="style.min.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        #stats-content {
            display: none;
        }
        .stat-banner {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
            margin-top: 40px;
        }
        .stat-number {
            font-size: 4rem;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header id="main-nav"></header>

    <div class="container">
        <!-- Login Section -->
        <div id="login-section" class="login-container card">
            <h3>Admin Access</h3>
            <p>Please enter your credentials to view site statistics.</p>
            <input type="password" id="admin-pass" placeholder="Password" class="skill-badge" style="width: 80%; margin: 20px 0; border: 1px solid #ccc;">
            <br>
            <button onclick="checkAccess()" class="btn">Login</button>
            <p id="login-error" style="color: red; display: none; margin-top: 10px;">Incorrect Password</p>
        </div>

        <!-- Dashboard Content -->
        <div id="stats-content">
            <section class="hero" style="border-radius: var(--border-radius); margin-top: 20px;">
                <h1>Visitor Statistics</h1>
                <p>Private analytics for your portfolio.</p>
            </section>

            <div class="stat-banner">
                <h3>Total Visits</h3>
                <div id="visit-count" class="stat-number">Loading...</div>
                <p>Since counter initialization</p>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 José Manuel Alvarado Mercado. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Simple obfuscated check for "JMAM2026"
        function checkAccess() {
            const pass = document.getElementById('admin-pass').value;
            // Basic check (not military grade, but works for an "hidden" page)
            if (pass === 'JMAM2026') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('stats-content').style.display = 'block';
                loadStats();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('https://api.countapi.xyz/get/josemanuel31675-cv/visits');
                const data = await response.json();
                document.getElementById('visit-count').innerText = data.value;
            } catch (error) {
                document.getElementById('visit-count').innerText = 'Error';
            }
        }
    </script>
    <script src="navigation.min.js"></script>
</body>
</html>
